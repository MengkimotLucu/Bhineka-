<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1A1A1A; stroke: #D4AF37; stroke-width: 2; }
      .grid-line { stroke: #333333; stroke-width: 1; stroke-dasharray: 4,4; }
      .text-title { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: bold; fill: #FFFFFF; letter-spacing: 2px; }
      .text-accent { fill: #D4AF37; }
      .text-body { font-family: 'Inter', sans-serif; font-size: 13px; fill: #CCCCCC; }
      .wave-path { fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.15; }
      .gold-stroke { stroke: #D4AF37; stroke-width: 2; }
      .red-stroke { stroke: #C62828; stroke-width: 3; }
      .orange-stroke { stroke: #F57C00; stroke-width: 2; }
    </style>
  </defs>

  <rect width="796" height="446" x="2" y="2" rx="12" class="bg" />

  <!-- Abstract Batik/Nusantara Wave Lines representing movement and culture -->
  <g>
    <path d="M -50 300 Q 150 150, 350 320 T 750 250" class="wave-path red-stroke" />
    <path d="M -50 320 Q 180 180, 380 340 T 780 270" class="wave-path orange-stroke" />
    <path d="M -50 280 Q 120 120, 320 290 T 720 220" class="wave-path gold-stroke" />
  </g>

  <!-- Graphic Elements (Traditional Gong / Shield stylized representation) -->
  <g transform="translate(600, 220)">
    <!-- Shield Outline -->
    <path d="M 0 -120 L 70 -60 L 50 80 L 0 120 L -50 80 L -70 -60 Z" fill="none" stroke="#D4AF37" stroke-width="3" />
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#C62828" stroke-width="4" />
    <!-- Inner Rings representing unity -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#F57C00" stroke-width="2" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#D4AF37" stroke-width="1.5" />
    <!-- Center Core -->
    <circle cx="0" cy="0" r="15" fill="#FFFFFF" />
  </g>

  <!-- Text and Information -->
  <g transform="translate(60, 60)">
    <text x="0" y="30" class="text-title">PANGGUNG BUDAYA <tspan class="text-accent">NUSANTARA</tspan></text>
    <text x="0" y="60" class="text-body" fill="#999999">Bhineka Run 2026 Menyajikan 9 Kesenian Kolosal Sepanjang Rute &amp; Panggung Utama</text>

    <!-- Grid of Culture Descriptions -->
    <g transform="translate(0, 110)">
      <!-- Item 1 -->
      <circle cx="15" cy="15" r="8" fill="#C62828" />
      <text x="35" y="20" font-family="'Oswald', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">TARI PENDET &amp; TOR-TOR</text>
      <text x="35" y="40" class="text-body">Sajian tarian penyambut pelari penuh keanggunan budaya Bali &amp; Sumatera Utara.</text>

      <!-- Item 2 -->
      <g transform="translate(0, 70)">
        <circle cx="15" cy="15" r="8" fill="#F57C00" />
        <text x="35" y="20" font-family="'Oswald', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RAMPAK BEDUG &amp; REOG PONOROGO</text>
        <text x="35" y="40" class="text-body">Dentuman perkusi tradisional Banten serta kemegahan topeng Reog Ponorogo.</text>
      </g>

      <!-- Item 3 -->
      <g transform="translate(0, 140)">
        <circle cx="15" cy="15" r="8" fill="#D4AF37" />
        <text x="35" y="20" font-family="'Oswald', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">ANGKLUNG &amp; TANJIDOR KASUAL</text>
        <text x="35" y="40" class="text-body">Alunan harmoni bambu Jawa Barat berpadu musik tiup tiada henti khas Betawi.</text>
      </g>

      <!-- Item 4 -->
      <g transform="translate(0, 210)">
        <circle cx="15" cy="15" r="8" fill="#FFFFFF" />
        <text x="35" y="20" font-family="'Oswald', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">BARONGSAI &amp; KUDA LUMPING</text>
        <text x="35" y="40" class="text-body">Keberagaman akulturasi seni kolosal pemacu semangat juang para runners.</text>
      </g>
    </g>
  </g>
</svg>
