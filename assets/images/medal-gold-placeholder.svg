<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <style>
      .card-bg { fill: #FFF7E6; stroke: #D4AF37; stroke-width: 1.5; }
      .ribbon-red { fill: #C62828; }
      .ribbon-white { fill: #FFFFFF; }
      .medal-gold { fill: url(#gold-grad); stroke: #8A6D0F; stroke-width: 3; }
      .medal-inner { fill: none; stroke: #8A6D0F; stroke-width: 1.5; stroke-dasharray: 4,2; }
      .text-title { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: bold; fill: #1A1A1A; text-anchor: middle; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 12px; fill: #666666; text-anchor: middle; }
    </style>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEFA6" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A6D0F" />
    </linearGradient>
  </defs>

  <rect width="298" height="298" x="1" y="1" rx="10" class="card-bg" />
  
  <!-- Ribbon (Red & White) -->
  <g transform="translate(100, 30)">
    <path d="M 10 0 L 35 110 L 50 110 L 25 0 Z" class="ribbon-red" />
    <path d="M 25 0 L 50 110 L 75 110 L 50 0 Z" class="ribbon-white" />
    <path d="M 50 0 L 75 110 L 90 110 L 65 0 Z" class="ribbon-red" />
  </g>

  <!-- Medal Disk -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="50" class="medal-gold" />
    <circle cx="0" cy="0" r="42" class="medal-inner" />
    
    <!-- Star engraving -->
    <path d="M 0 -22 L 6 -6 L 22 -6 L 9 5 L 14 21 L 0 11 L -14 21 L -9 5 L -22 -6 L -6 -6 Z" fill="#8A6D0F" opacity="0.3" />
    
    <!-- Medal Text -->
    <text x="0" y="8" font-family="'Oswald', sans-serif" font-size="20" font-weight="900" fill="#4A3B07" text-anchor="middle">10K</text>
    <text x="0" y="24" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#4A3B07" text-anchor="middle">GOLD</text>
  </g>

  <text x="150" y="240" class="text-title">10K FINISHER MEDAL</text>
  <text x="150" y="265" class="text-sub">Gold Metal - Motif Kebhinekaan Khas</text>
</svg>
