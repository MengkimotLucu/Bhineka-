<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FFF7E6; }
      .grid-line { stroke: #E6DCC8; stroke-width: 1; stroke-dasharray: 4,4; }
      .map-road { fill: none; stroke: #D4CDBC; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .map-road-inner { fill: none; stroke: #FFFFFF; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .route-5k { fill: none; stroke: #C62828; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 2,1; }
      .landmark { fill: #EADCB9; stroke: #C2B38E; stroke-width: 2; }
      .landmark-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #5C523C; font-weight: bold; text-anchor: middle; }
      .legend-title { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: bold; fill: #1A1A1A; }
      .legend-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #333333; }
      .pin { stroke: #FFFFFF; stroke-width: 2; }
      .pin-sf { fill: #C62828; }
      .pin-ws { fill: #0288D1; }
      .pin-md { fill: #D32F2F; }
      .pin-cz { fill: #FBC02D; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Grid -->
  <g>
    <line x1="100" y1="0" x2="100" y2="450" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="450" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="450" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="450" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="450" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="450" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="450" class="grid-line" />
    
    <line x1="0" y1="100" x2="800" y2="100" class="grid-line" />
    <line x1="0" y1="200" x2="800" y2="200" class="grid-line" />
    <line x1="0" y1="300" x2="800" y2="300" class="grid-line" />
    <line x1="0" y1="400" x2="800" y2="400" class="grid-line" />
  </g>

  <!-- Landmarks -->
  <path d="M 120 180 C 120 120, 220 120, 220 180 C 220 240, 120 240, 120 180 Z" class="landmark" />
  <text x="170" y="185" class="landmark-text">Plaza Keong Mas</text>

  <rect x="420" y="80" width="120" height="80" rx="8" class="landmark" />
  <text x="480" y="125" class="landmark-text">Taman Burung</text>

  <circle cx="360" cy="300" r="45" class="landmark" />
  <text x="360" y="305" class="landmark-text">Danau Arsipel</text>

  <!-- Roads Network -->
  <g>
    <path d="M 170 230 L 170 340 L 360 340 L 520 300 L 520 150 L 360 150 L 170 230" class="map-road" />
    <path d="M 170 230 L 170 340 L 360 340 L 520 300 L 520 150 L 360 150 L 170 230" class="map-road-inner" />
  </g>

  <!-- 5K Active Route Highlight (Merah) -->
  <path d="M 170 230 L 170 340 L 360 340 L 520 300 L 520 150 L 360 150 L 170 230" class="route-5k" />

  <!-- Pins -->
  <circle cx="170" cy="230" r="10" class="pin pin-sf" />
  <text x="170" y="234" font-family="Arial" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">S/F</text>
  
  <circle cx="170" cy="320" r="8" class="pin pin-ws" />
  <text x="170" y="323" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WS 1</text>

  <circle cx="520" cy="220" r="8" class="pin pin-ws" />
  <text x="520" y="223" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">WS 2</text>

  <circle cx="360" cy="340" r="8" class="pin pin-md" />
  <text x="360" y="343" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">M 1</text>

  <circle cx="360" cy="150" r="8" class="pin pin-md" />
  <text x="360" y="153" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">M 2</text>

  <circle cx="440" cy="320" r="8" class="pin pin-cz" />
  <text x="440" y="323" font-family="Arial" font-size="8" font-weight="bold" fill="#1A1A1A" text-anchor="middle">CZ</text>

  <!-- Title & Legend Card -->
  <g transform="translate(540, 220)">
    <rect x="0" y="0" width="230" height="200" rx="10" fill="#FFFFFF" stroke="#D4AF37" stroke-width="1.5" />
    <text x="20" y="35" class="legend-title">PETA RUTE 5K (NATIONAL)</text>
    
    <!-- Legend Items -->
    <circle cx="30" cy="65" r="7" class="pin pin-sf" />
    <text x="50" y="69" class="legend-text">Start / Finish (Keong Mas)</text>

    <circle cx="30" cy="95" r="7" class="pin pin-ws" />
    <text x="50" y="99" class="legend-text">Water Station (2 Lokasi)</text>

    <circle cx="30" cy="125" r="7" class="pin pin-md" />
    <text x="50" y="129" class="legend-text">Pos Medis (2 Lokasi)</text>

    <circle cx="30" cy="155" r="7" class="pin pin-cz" />
    <text x="50" y="159" class="legend-text">Cheering Zone (CZ)</text>

    <line x1="20" y1="180" x2="40" y2="180" stroke="#C62828" stroke-width="4" stroke-dasharray="3,2" />
    <text x="50" y="184" class="legend-text">Jalur Rute 5K (COT: 90 Menit)</text>
  </g>
</svg>
