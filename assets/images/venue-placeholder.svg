<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FFF7E6; stroke: #C62828; stroke-width: 2; }
      .grid-line { stroke: #E6DCC8; stroke-width: 1; stroke-dasharray: 4,4; }
      .map-block { fill: #EADCB9; stroke: #C2B38E; stroke-width: 2; }
      .map-road { fill: none; stroke: #FFFFFF; stroke-width: 16; stroke-linecap: round; }
      .map-road-border { fill: none; stroke: #D4CDBC; stroke-width: 20; stroke-linecap: round; }
      .text-title { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: bold; fill: #C62828; }
      .text-body { font-family: 'Inter', sans-serif; font-size: 13px; fill: #1A1A1A; }
      .pin-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>

  <rect width="796" height="446" x="2" y="2" rx="12" class="bg" />

  <!-- Grid -->
  <g opacity="0.5">
    <line x1="200" y1="0" x2="200" y2="450" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="450" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="450" class="grid-line" />
    <line x1="0" y1="150" x2="800" y2="150" class="grid-line" />
    <line x1="0" y1="300" x2="800" y2="300" class="grid-line" />
  </g>

  <!-- Title -->
  <text x="40" y="50" class="text-title">PANDUAN LOKASI & AKSES VENUE</text>
  <text x="40" y="75" class="text-body" fill="#666666">Plaza Keong Mas, Taman Mini Indonesia Indah (TMII), Jakarta</text>

  <!-- Vector Layout of Venue -->
  <!-- Keong Mas Dome representation -->
  <path d="M 550 220 C 550 140, 710 140, 710 220 C 710 300, 550 300, 550 220 Z" fill="#D4AF37" stroke="#A6841C" stroke-width="3" opacity="0.8" />
  <circle cx="630" cy="220" r="15" fill="#FFFFFF" opacity="0.3" />
  <text x="630" y="225" font-family="'Oswald', sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A" text-anchor="middle">KEONG MAS DOME</text>

  <!-- Roads/Access -->
  <path d="M 380 220 H 550" class="map-road-border" />
  <path d="M 380 220 H 550" class="map-road" />
  
  <path d="M 380 50 V 380" class="map-road-border" />
  <path d="M 380 50 V 380" class="map-road" />

  <!-- Parking Areas -->
  <rect x="420" y="320" width="100" height="60" rx="6" class="map-block" />
  <text x="470" y="355" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#5C523C" text-anchor="middle">ZONA PARKIR A</text>

  <rect x="420" y="100" width="100" height="60" rx="6" class="map-block" />
  <text x="470" y="135" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#5C523C" text-anchor="middle">ZONA PARKIR B</text>

  <!-- Info Cards -->
  <g transform="translate(40, 110)">
    <!-- Transport Card -->
    <rect width="300" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 15 15 H 35 V 35 H 15 Z" fill="#C62828" rx="4" />
    <text x="25" y="29" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">T</text>
    <text x="45" y="28" font-family="'Oswald', sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">TRANSPORTASI UMUM</text>
    <text x="45" y="48" class="text-body">• LRT Jabodebek: Turun di Stasiun LRT TMII</text>
    <text x="45" y="68" class="text-body">• Transjakarta: Rute 7D langsung ke Gerbang TMII</text>
  </g>

  <g transform="translate(40, 220)">
    <!-- Parking Info Card -->
    <rect width="300" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 15 15 H 35 V 35 H 15 Z" fill="#F57C00" rx="4" />
    <text x="25" y="29" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">P</text>
    <text x="45" y="28" font-family="'Oswald', sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">ZONA PARKIR RESMI</text>
    <text x="45" y="48" class="text-body">• Elevated Parking TMII &amp; Plaza Barat</text>
    <text x="45" y="68" class="text-body">• Parkir Masjid At-Tin &amp; Padepokan Pencak Silat</text>
  </g>

  <g transform="translate(40, 330)">
    <!-- Medical Card -->
    <rect width="300" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 15 15 H 35 V 35 H 15 Z" fill="#D32F2F" rx="4" />
    <text x="25" y="29" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">+</text>
    <text x="45" y="28" font-family="'Oswald', sans-serif" font-size="14" font-weight="bold" fill="#1A1A1A">RUMAH SAKIT RUJUKAN</text>
    <text x="45" y="48" class="text-body">• RSU Adhyaksa (3 Menit dari Lokasi)</text>
    <text x="45" y="68" class="text-body">• RS Brawijaya Saharjo (Mitra Medis Resmi)</text>
  </g>
</svg>
